<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" id="meta-theme-color" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <script>
      (function () {
        var b = localStorage.getItem("montazh_brand");
        if (b !== "samolet" && b !== "vtb") b = "samolet";
        document.documentElement.setAttribute("data-brand", b);
      })();
    </script>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Метраж</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <div id="setup-banner" class="setup-banner">
      Таблица не подключена. Бригадиру: <strong>config.js</strong> → API_URL.
    </div>

    <header class="app-header">
      <button type="button" class="nav-back" id="nav-back" hidden aria-label="Назад">←</button>
      <div class="header-text">
        <h1 id="screen-title">Метраж</h1>
        <p class="breadcrumb" id="breadcrumb"></p>
      </div>
      <div class="status-bar">
        <span class="pill ok" id="stat-done">—</span>
        <span class="pill" id="stat-net">—</span>
      </div>
      <div class="brand-switch" id="brand-switch" role="group" aria-label="Цветовая схема">
        <button type="button" data-brand="samolet" class="active">Самолёт</button>
        <button type="button" data-brand="vtb">ВТБ</button>
      </div>
    </header>

    <!-- 1. Системы (СОТ, РФ, …) -->
    <div id="screen-systems" class="screen active">
      <p class="screen-hint">Выберите систему</p>
      <div class="search-wrap">
        <input
          type="search"
          id="global-search"
          placeholder="Быстрый поиск камеры…"
          autocomplete="off"
        />
      </div>
      <div id="search-results" class="search-results hidden"></div>
      <main id="systems-root" class="tile-grid"></main>
    </div>

    <!-- 2. Секции -->
    <div id="screen-sections" class="screen">
      <p class="screen-hint screen-hint--sections">Нажмите на <strong>номер секции</strong> — цвет и счётчик справа</p>
      <main id="sections-root" class="tile-grid"></main>
    </div>

    <!-- 3. Камеры в секции -->
    <div id="screen-cameras" class="screen">
      <p class="screen-hint">Выберите камеру</p>
      <main id="cameras-root" class="camera-list"></main>
    </div>

    <!-- 4. Ввод метража -->
    <div id="screen-input" class="screen screen-input">
      <div class="input-card">
        <p class="input-system" id="input-system"></p>
        <h2 class="cam-code" id="input-code">ВК2.1.1</h2>
        <p class="cam-info" id="input-info"></p>
        <p class="meters-label">Метры кабеля:</p>
        <p class="clear-hint">Число <strong>0</strong> и «СОХРАНИТЬ» — стереть метраж (для проверки)</p>
        <div class="meters-display empty" id="meters-display">—</div>
        <div class="numpad" id="numpad">
          <button type="button" data-digit="1">1</button>
          <button type="button" data-digit="2">2</button>
          <button type="button" data-digit="3">3</button>
          <button type="button" data-digit="4">4</button>
          <button type="button" data-digit="5">5</button>
          <button type="button" data-digit="6">6</button>
          <button type="button" data-digit="7">7</button>
          <button type="button" data-digit="8">8</button>
          <button type="button" data-digit="9">9</button>
          <button type="button" class="key-clear" data-action="clear">Стереть</button>
          <button type="button" data-digit="0">0</button>
          <button type="button" class="key-back" data-action="back">⌫</button>
        </div>
        <p class="overwrite-hint" id="overwrite-hint"></p>
        <button type="button" class="save-btn" id="btn-save" disabled>СОХРАНИТЬ</button>
      </div>
    </div>

    <div id="toast" class="toast" role="status"></div>

    <script src="config.js"></script>
    <script src="js/app.js" type="module"></script>
  </body>
</html>
